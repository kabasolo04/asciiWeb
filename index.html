<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image to ASCII</title>

<style>
body {
  background: #0f172a;
  color: #e2e8f0;
  font-family: monospace;
  text-align: center;
  padding: 20px;
}

h1 {
  margin-bottom: 20px;
}

input, select, button {
  margin: 10px;
  padding: 8px;
  border-radius: 6px;
  border: none;
}

button {
  background: #334155;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #475569;
}

pre {
  margin-top: 20px;
  background: #020617;
  padding: 15px;
  overflow-x: auto;
  border-radius: 10px;
  font-size: 6px;
  line-height: 6px;
  white-space: pre;
}
</style>
</head>

<body>

<h1>Image to ASCII</h1>

<input type="file" id="imageInput"><br>

<label>Resolución:</label>
<input type="range" min="50" max="250" value="120" id="scale"><br>

<label>Estilo:</label>
<select id="charset">
  <option value="simple">Simple</option>
  <option value="blocks">Blocks</option>
  <option value="detailed">Detailed</option>
</select><br>

<button id="makeBtn">🔥 Make it!</button>
<button id="copyBtn">Copiar ASCII</button>
<button id="downloadBtn">Descargar .txt</button>

<pre id="output"></pre>

<script>
const input = document.getElementById("imageInput");
const output = document.getElementById("output");
const scale = document.getElementById("scale");
const charset = document.getElementById("charset");
const makeBtn = document.getElementById("makeBtn");

let currentImage = null;
let lastAscii = "";

const charSets = {
  simple: "@%#*+=-:. ",
  blocks: "█▓▒░ ",
  detailed: "@#W$9876543210?!abc;:+=-,._ "
};

// Guardar imagen cuando se sube
input.addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const img = new Image();
  img.src = URL.createObjectURL(file);

  img.onload = () => {
    currentImage = img;
    output.textContent = "Image loaded. Press Make it!";
  };
});

// Función principal
function generateASCII() {
  if (!currentImage) return;

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  const width = parseInt(scale.value);
  const height = Math.floor((currentImage.height / currentImage.width) * width);

  canvas.width = width;
  canvas.height = height;

  ctx.drawImage(currentImage, 0, 0, width, height);

  const data = ctx.getImageData(0, 0, width, height).data;

  let ascii = "";
  const chars = charSets[charset.value];

  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];

    const avg = (r + g + b) / 3;
    const charIndex = Math.floor((avg / 255) * (chars.length - 1));

    ascii += chars[charIndex];

    if ((i / 4 + 1) % width === 0) ascii += "\n";
  }

  output.textContent = ascii;
  lastAscii = ascii;
}

// BOTÓN PRINCIPAL
makeBtn.onclick = () => {
  generateASCII();
};

// Re-generar automáticamente cuando cambias settings
scale.oninput = () => {
  if (currentImage) generateASCII();
};

charset.onchange = () => {
  if (currentImage) generateASCII();
};

// Copiar
document.getElementById("copyBtn").onclick = () => {
  navigator.clipboard.writeText(lastAscii || "");
  alert("Copiado!");
};

// Descargar
document.getElementById("downloadBtn").onclick = () => {
  const blob = new Blob([lastAscii || ""], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "ascii.txt";
  a.click();
};
</script>

</body>
</html>
