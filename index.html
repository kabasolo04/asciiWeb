<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fast Colored ASCII</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: monospace;
  text-align: center;
  padding: 20px;
}

pre {
  margin-top: 20px;
  background: #020617;
  padding: 15px;
  overflow-x: auto;
  border-radius: 10px;
  font-size: 6px;
  line-height: 6px;
  white-space: pre;
}
</style>
</head>

<body>

<h1>Fast Colored ASCII</h1>

<input type="file" id="imageInput"><br>

<label>Resolution:</label>
<input type="range" min="40" max="160" value="90" id="scale"><br>

<pre id="output"></pre>

<script>
const input = document.getElementById("imageInput");
const output = document.getElementById("output");
const scale = document.getElementById("scale");

let img = null;
let lastTimeout = null;

const chars = "@%#*+=-:. ";

function render() {
  if (!img) return;

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  const width = parseInt(scale.value);
  const height = Math.floor((img.height / img.width) * width);

  canvas.width = width;
  canvas.height = height;

  ctx.drawImage(img, 0, 0, width, height);

  const data = ctx.getImageData(0, 0, width, height).data;

  let html = "";

  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];

    const avg = (r + g + b) / 3;
    const char = chars[Math.floor((avg / 255) * (chars.length - 1))];

    html += `<span style="color:rgb(${r},${g},${b})">${char}</span>`;

    if ((i / 4 + 1) % width === 0) html += "\n";
  }

  output.innerHTML = html;
}

function throttledRender() {
  clearTimeout(lastTimeout);
  lastTimeout = setTimeout(render, 80); // IMPORTANT: throttle
}

input.addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;

  img = new Image();
  img.src = URL.createObjectURL(file);

  img.onload = render;
});

scale.addEventListener("input", throttledRender);
</script>

</body>
</html>
