<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image to ASCII (Colored)</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: monospace;
  text-align: center;
  padding: 20px;
}

h1 {
  margin-bottom: 20px;
}

input, select {
  margin: 10px;
  padding: 8px;
}

pre {
  margin-top: 20px;
  background: #020617;
  padding: 15px;
  overflow-x: auto;
  border-radius: 10px;
  font-size: 6px;
  line-height: 6px;
  white-space: pre;
}
</style>
</head>

<body>

<h1>Image to Colored ASCII</h1>

<input type="file" id="imageInput"><br>

<label>Resolution:</label>
<input type="range" min="50" max="250" value="120" id="scale"><br>

<label>Style:</label>
<select id="charset">
  <option value="simple">Simple</option>
  <option value="blocks">Blocks</option>
  <option value="detailed">Detailed</option>
</select><br>

<pre id="output"></pre>

<script>
const input = document.getElementById("imageInput");
const output = document.getElementById("output");
const scale = document.getElementById("scale");
const charset = document.getElementById("charset");

let currentImage = null;

const charSets = {
  simple: "@%#*+=-:. ",
  blocks: "█▓▒░ ",
  detailed: "@#W$9876543210?!abc;:+=-,._ "
};

function generate() {
  if (!currentImage) return;

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  const width = parseInt(scale.value);
  const height = Math.floor((currentImage.height / currentImage.width) * width);

  canvas.width = width;
  canvas.height = height;

  ctx.drawImage(currentImage, 0, 0, width, height);

  const data = ctx.getImageData(0, 0, width, height).data;
  const chars = charSets[charset.value];

  let html = "";

  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];

    const avg = (r + g + b) / 3;
    const charIndex = Math.floor((avg / 255) * (chars.length - 1));
    const char = chars[charIndex];

    html += `<span style="color:rgb(${r},${g},${b})">${char}</span>`;

    if ((i / 4 + 1) % width === 0) html += "<br>";
  }

  output.innerHTML = html;
}

input.addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const img = new Image();
  img.src = URL.createObjectURL(file);

  img.onload = () => {
    currentImage = img;
    generate();
  };
});

scale.oninput = generate;
charset.onchange = generate;
</script>

</body>
</html>
